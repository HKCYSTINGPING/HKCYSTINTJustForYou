<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匿名留言系統 | Anonymous Messaging System</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Google Fonts & Font Awesome for Modern UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Background decorative elements -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <div class="app-container">

    <!-- ==================================================== -->
    <!-- 1. LOGIN SECTION (身分驗證頁面) -->
    <!-- ==================================================== -->
    <section id="loginView" class="card view-section active">
      <div class="card-header text-center">
        <div class="app-icon">🔒</div>
        <h2>匿名留言系統</h2>
        <p class="subtitle">請完成雙重身分驗證以進入系統</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginParticipantId"><i class="fa-solid fa-user-tag"></i> 選擇參加者編號：</label>
          <select id="loginParticipantId" class="form-control" required>
            <option value="" disabled selected>請選擇編號 (如 1A, 3C...)</option>
            <!-- Hardcoded 1A - 6H -->
            <option value="1A">參加者 1A</option>
            <option value="2A">參加者 2A</option>
            <option value="3A">參加者 3A</option>
            <option value="4A">參加者 4A</option>
            <option value="5A">參加者 5A</option>
            <option value="6A">參加者 6A</option>

            <option value="1B">參加者 1B</option>
            <option value="2B">參加者 2B</option>
            <option value="3B">參加者 3B</option>
            <option value="4B">參加者 4B</option>
            <option value="5B">參加者 5B</option>
            <option value="6B">參加者 6B</option>

            <option value="1C">參加者 1C</option>
            <option value="2C">參加者 2C</option>
            <option value="3C">參加者 3C</option>
            <option value="4C">參加者 4C</option>
            <option value="5C">參加者 5C</option>
            <option value="6C">參加者 6C</option>

            <option value="1D">參加者 1D</option>
            <option value="2D">參加者 2D</option>
            <option value="3D">參加者 3D</option>
            <option value="4D">參加者 4D</option>
            <option value="5D">參加者 5D</option>
            <option value="6D">參加者 6D</option>

            <option value="1E">參加者 1E</option>
            <option value="2E">參加者 2E</option>
            <option value="3E">參加者 3E</option>
            <option value="4E">參加者 4E</option>
            <option value="5E">參加者 5E</option>
            <option value="6E">參加者 6E</option>

            <option value="1F">參加者 1F</option>
            <option value="2F">參加者 2F</option>
            <option value="3F">參加者 3F</option>
            <option value="4F">參加者 4F</option>
            <option value="5F">參加者 5F</option>
            <option value="6F">參加者 6F</option>

            <option value="1G">參加者 1G</option>
            <option value="2G">參加者 2G</option>
            <option value="3G">參加者 3G</option>
            <option value="4G">參加者 4G</option>
            <option value="5G">參加者 5G</option>
            <option value="6G">參加者 6G</option>

            <option value="1H">參加者 1H</option>
            <option value="2H">參加者 2H</option>
            <option value="3H">參加者 3H</option>
            <option value="4H">參加者 4H</option>
            <option value="5H">參加者 5H</option>
            <option value="6H">參加者 6H</option>
          </select>
        </div>

        <div class="form-group">
          <label for="loginPhoneNumber"><i class="fa-solid fa-phone"></i> 電話號碼驗證：</label>
          <input type="tel" id="loginPhoneNumber" class="form-control" placeholder="例：+8529123451 或 9123451" required>
        </div>

        <button type="submit" id="btnLogin" class="btn btn-primary btn-block">
          <span class="btn-text">驗證並進入系統 🚀</span>
          <span class="progress-bar-fill" id="loginProgress"></span>
        </button>
      </form>
    </section>

    <!-- ==================================================== -->
    <!-- 2. MAIN DASHBOARD SECTION (控制台與三大分頁) -->
    <!-- ==================================================== -->
    <main id="dashboardView" class="card view-section hidden">
      <!-- Top Navbar & User Info -->
      <header class="dashboard-header">
        <div class="user-badge">
          <span class="avatar">👤</span>
          <div>
            <span class="user-id" id="currentUserDisplay">參加者 --</span>
            <span class="status-online"><i class="fa-solid fa-circle"></i> 線上已驗證</span>
          </div>
        </div>
        <button class="btn btn-outline-danger btn-sm" onclick="handleLogout()">
          <i class="fa-solid fa-right-from-bracket"></i> 登出
        </button>
      </header>

      <!-- Navigation Tabs -->
      <nav class="nav-tabs">
        <button class="tab-btn active" data-tab="tabSend" onclick="switchTab('tabSend')">
          <i class="fa-regular fa-paper-plane"></i> ✏️ 發送留言
        </button>
        <button class="tab-btn" data-tab="tabInbox" onclick="switchTab('tabInbox')">
          <i class="fa-regular fa-envelope"></i> 📥 收件箱
          <span id="unreadBadge" class="badge-count hidden">0</span>
        </button>
        <button class="tab-btn" data-tab="tabSent" onclick="switchTab('tabSent')">
          <i class="fa-solid fa-box-archive"></i> 📤 送出的留言
        </button>
      </nav>

      <!-- TAB 1: 發送留言 (Send Message) -->
      <section id="tabSend" class="tab-content active">
        <form id="sendMessageForm" onsubmit="handleSendMessage(event)">
          <div class="form-group">
            <label for="receiverId"><i class="fa-solid fa-paper-plane"></i> 選擇發送對象（系統已自動過濾自己）：</label>
            <select id="receiverId" class="form-control" required>
              <!-- JS 動態填入過濾後的 47 位參加者 -->
            </select>
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="messageContent"><i class="fa-solid fa-comment-dots"></i> 留言內容：</label>
              <span id="charCounter" class="char-counter">剩餘 300 字</span>
            </div>

            <!-- Emoji Bar -->
            <div class="emoji-picker-bar">
              <span class="emoji-label">快捷 Emoji:</span>
              <button type="button" class="emoji-btn" onclick="insertEmoji('✨')">✨</button>
              <button type="button" class="emoji-btn" onclick="insertEmoji('❤️')">❤️</button>
              <button type="button" class="emoji-btn" onclick="insertEmoji('👏')">👏</button>
              <button type="button" class="emoji-btn" onclick="insertEmoji('🔥')">🔥</button>
              <button type="button" class="emoji-btn" onclick="insertEmoji('😊')">😊</button>
              <button type="button" class="emoji-btn" onclick="insertEmoji('🫶')">🫶</button>
              <button type="button" class="emoji-btn" onclick="insertEmoji('🎉')">🎉</button>
              <button type="button" class="emoji-btn" onclick="insertEmoji('💪')">💪</button>
              <button type="button" class="emoji-btn" onclick="insertEmoji('🌟')">🌟</button>
            </div>

            <textarea id="messageContent" class="form-control" rows="5" maxlength="300" 
                      placeholder="寫下您想對他/她說的話吧... (請遵守社群禮儀，系統設有敏感詞過濾)" required></textarea>
            <div id="filterWarning" class="warning-text hidden">
              ⚠️ 內容包含敏感或粗俗字詞，請修訂後再發送！
            </div>
          </div>

          <button type="submit" id="btnSend" class="btn btn-success btn-block">
            <span class="btn-text">匿名傳送訊息 💌</span>
            <span class="progress-bar-fill" id="sendProgress"></span>
          </button>
        </form>
      </section>

      <!-- TAB 2: 收件箱 (Inbox) -->
      <section id="tabInbox" class="tab-content">
        <div class="tab-actions">
          <h3>📥 收到的匿名留言</h3>
          <button class="btn btn-secondary btn-sm" onclick="fetchInboxMessages(true)">
            <i class="fa-solid fa-rotate-right"></i> 即時重整
          </button>
        </div>
        <p class="section-desc">🔒 基於保護原則，發送者身分已被徹底隱藏。</p>
        
        <div id="inboxList" class="message-list">
          <div class="empty-state">資料載入中...</div>
        </div>
      </section>

      <!-- TAB 3: 送出的留言 (Sent Messages) -->
      <section id="tabSent" class="tab-content">
        <div class="tab-actions">
          <h3>📤 我發送過的留言紀錄</h3>
          <span class="sync-tag"><i class="fa-solid fa-cloud-arrow-up"></i> 已啟用雙重備份 (Cloud + Local)</span>
        </div>
        <p class="section-desc">此處保留您發送給其他參加者的歷史訊息紀錄。</p>

        <div id="sentList" class="message-list">
          <div class="empty-state">尚未發送過任何留言</div>
        </div>
      </section>
    </main>

  </div>

  <!-- Toast Notification Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
