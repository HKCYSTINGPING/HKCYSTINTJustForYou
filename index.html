<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💬 匿名留言系統</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Global Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden" aria-hidden="true" aria-live="polite">
    <div class="loading-overlay-content">
      <div class="loading-spinner"></div>
      <p id="loading-overlay-text">⏳ 載入中...</p>
      <p id="loading-overlay-percent" class="loading-percent">0%</p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Login Screen -->
  <section id="login-screen" class="screen login-screen">
    <div class="login-card">
      <div class="login-header">
        <span class="login-emoji">🔐</span>
        <h1>匿名留言系統</h1>
        <p class="subtitle">Anonymous Messaging System</p>
        <p class="desc">請選擇您的編號並輸入電話號碼以驗證身分 ✨</p>
      </div>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="participant-id">👤 參加者編號</label>
          <select id="participant-id" name="participant_id" required>
            <option value="" disabled selected>請選擇編號 (如 1A, 3C...)</option>
            <option value="1A">參加者 1A</option>
            <option value="2A">參加者 2A</option>
            <option value="3A">參加者 3A</option>
            <option value="4A">參加者 4A</option>
            <option value="5A">參加者 5A</option>
            <option value="6A">參加者 6A</option>
            <option value="1B">參加者 1B</option>
            <option value="2B">參加者 2B</option>
            <option value="3B">參加者 3B</option>
            <option value="4B">參加者 4B</option>
            <option value="5B">參加者 5B</option>
            <option value="6B">參加者 6B</option>
            <option value="1C">參加者 1C</option>
            <option value="2C">參加者 2C</option>
            <option value="3C">參加者 3C</option>
            <option value="4C">參加者 4C</option>
            <option value="5C">參加者 5C</option>
            <option value="6C">參加者 6C</option>
            <option value="1D">參加者 1D</option>
            <option value="2D">參加者 2D</option>
            <option value="3D">參加者 3D</option>
            <option value="4D">參加者 4D</option>
            <option value="5D">參加者 5D</option>
            <option value="6D">參加者 6D</option>
            <option value="1E">參加者 1E</option>
            <option value="2E">參加者 2E</option>
            <option value="3E">參加者 3E</option>
            <option value="4E">參加者 4E</option>
            <option value="5E">參加者 5E</option>
            <option value="6E">參加者 6E</option>
            <option value="1F">參加者 1F</option>
            <option value="2F">參加者 2F</option>
            <option value="3F">參加者 3F</option>
            <option value="4F">參加者 4F</option>
            <option value="5F">參加者 5F</option>
            <option value="6F">參加者 6F</option>
            <option value="1G">參加者 1G</option>
            <option value="2G">參加者 2G</option>
            <option value="3G">參加者 3G</option>
            <option value="4G">參加者 4G</option>
            <option value="5G">參加者 5G</option>
            <option value="6G">參加者 6G</option>
            <option value="1H">參加者 1H</option>
            <option value="2H">參加者 2H</option>
            <option value="3H">參加者 3H</option>
            <option value="4H">參加者 4H</option>
            <option value="5H">參加者 5H</option>
            <option value="6H">參加者 6H</option>
          </select>
        </div>

        <div class="form-group">
          <label for="phone-number">📱 電話號碼</label>
          <input
            type="tel"
            id="phone-number"
            name="phone_number"
            placeholder="請輸入您的電話號碼"
            autocomplete="tel"
            inputmode="numeric"
            pattern="[0-9]*"
            required
          >
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-progress">
          <span class="btn-text">🚀 登入驗證</span>
          <span class="btn-progress-bar" aria-hidden="true"></span>
          <span class="btn-progress-label" aria-hidden="true">0%</span>
        </button>
      </form>

      <p class="login-footer">🛡️ 您的身分將受到保護，留言完全匿名</p>
    </div>
  </section>

  <!-- Dashboard -->
  <section id="dashboard-screen" class="screen dashboard-screen hidden">
    <header class="dashboard-header">
      <div class="header-info">
        <h1>💬 匿名留言控制台</h1>
        <p id="user-badge" class="user-badge"></p>
      </div>
      <button type="button" id="logout-btn" class="btn btn-ghost">🚪 登出</button>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-nav" role="tablist">
      <button type="button" class="tab-btn active" data-tab="send" role="tab" aria-selected="true">
        ✏️ 發送留言
      </button>
      <button type="button" class="tab-btn" data-tab="inbox" role="tab" aria-selected="false">
        📥 收件箱
        <span id="inbox-badge" class="tab-badge hidden">0</span>
      </button>
      <button type="button" class="tab-btn" data-tab="sent" role="tab" aria-selected="false">
        📤 送出的留言
      </button>
    </nav>

    <main class="tab-content">
      <!-- Send Message Tab -->
      <section id="tab-send" class="tab-panel active" role="tabpanel">
        <div class="panel-card">
          <h2>✏️ 發送匿名留言</h2>
          <p class="panel-desc">選擇接收對象，寫下您想說的話 💌</p>

          <form id="send-form" class="send-form" novalidate>
            <div class="form-group">
              <label for="receiver-id">🎯 接收對象</label>
              <select id="receiver-id" name="receiver_id" required>
                <option value="" disabled selected>請選擇接收者</option>
              </select>
            </div>

            <div class="form-group">
              <label for="message-content">
                💬 留言內容
                <span id="char-count" class="char-count">0 / 300</span>
              </label>
              <textarea
                id="message-content"
                name="content"
                rows="6"
                maxlength="300"
                placeholder="在這裡輸入您的匿名留言..."
                required
              ></textarea>
              <p id="bad-word-warning" class="bad-word-warning hidden">⚠️ 偵測到不當用語，請修正後再發送</p>
            </div>

            <button type="submit" id="send-btn" class="btn btn-primary btn-progress" disabled>
              <span class="btn-text">📨 發送留言</span>
              <span class="btn-progress-bar" aria-hidden="true"></span>
              <span class="btn-progress-label" aria-hidden="true">0%</span>
            </button>
          </form>
        </div>
      </section>

      <!-- Inbox Tab -->
      <section id="tab-inbox" class="tab-panel" role="tabpanel">
        <div class="panel-card">
          <div class="panel-header-row">
            <div>
              <h2>📥 收件箱</h2>
              <p class="panel-desc">收到的留言完全匿名，不顯示發件者 🕵️</p>
            </div>
            <button type="button" id="refresh-inbox-btn" class="btn btn-secondary btn-progress">
              <span class="btn-text">🔄 重整</span>
              <span class="btn-progress-bar" aria-hidden="true"></span>
              <span class="btn-progress-label" aria-hidden="true">0%</span>
            </button>
          </div>

          <div id="inbox-list" class="message-list">
            <div class="empty-state">
              <span class="empty-emoji">📭</span>
              <p>目前沒有留言</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Sent Messages Tab -->
      <section id="tab-sent" class="tab-panel" role="tabpanel">
        <div class="panel-card">
          <h2>📤 送出的留言</h2>
          <p class="panel-desc">您曾發送過的留言紀錄（含本地備份）📋</p>

          <div id="sent-list" class="message-list">
            <div class="empty-state">
              <span class="empty-emoji">📤</span>
              <p>尚未發送任何留言</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </section>

  <script src="app.js"></script>
</body>
</html>
