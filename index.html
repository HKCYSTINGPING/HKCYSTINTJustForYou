<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匿名留言系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==========================================================================
       AUTHENTICATION SCREEN (LOGIN)
       ========================================================================== -->
  <div id="auth-screen" class="container">
    <div class="card">
      <h1 class="title">參加者登入</h1>
      <p class="subtitle">請選擇你的參加者編號並輸入電話號碼以驗證身份</p>

      <form id="login-form" onsubmit="handleLogin(event)">
        <!-- 錯誤訊息提示 -->
        <div id="auth-error" class="error-msg hidden"></div>

        <div class="form-group">
          <label for="login-participant-id">參加者編號：</label>
          <select id="login-participant-id" required>
            <option value="" disabled selected>請選擇編號 (如 1A, 3C...)</option>
            <!-- Hardcoded Fallback + JS population -->
            <option value="1A">參加者 1A</option>
            <option value="2A">參加者 2A</option>
            <option value="3A">參加者 3A</option>
            <option value="4A">參加者 4A</option>
            <option value="5A">參加者 5A</option>
            <option value="6A">參加者 6A</option>

            <option value="1B">參加者 1B</option>
            <option value="2B">參加者 2B</option>
            <option value="3B">參加者 3B</option>
            <option value="4B">參加者 4B</option>
            <option value="5B">參加者 5B</option>
            <option value="6B">參加者 6B</option>

            <option value="1C">參加者 1C</option>
            <option value="2C">參加者 2C</option>
            <option value="3C">參加者 3C</option>
            <option value="4C">參加者 4C</option>
            <option value="5C">參加者 5C</option>
            <option value="6C">參加者 6C</option>

            <option value="1D">參加者 1D</option>
            <option value="2D">參加者 2D</option>
            <option value="3D">參加者 3D</option>
            <option value="4D">參加者 4D</option>
            <option value="5D">參加者 5D</option>
            <option value="6D">參加者 6D</option>

            <option value="1E">參加者 1E</option>
            <option value="2E">參加者 2E</option>
            <option value="3E">參加者 3E</option>
            <option value="4E">參加者 4E</option>
            <option value="5E">參加者 5E</option>
            <option value="6E">參加者 6E</option>

            <option value="1F">參加者 1F</option>
            <option value="2F">參加者 2F</option>
            <option value="3F">參加者 3F</option>
            <option value="4F">參加者 4F</option>
            <option value="5F">參加者 5F</option>
            <option value="6F">參加者 6F</option>

            <option value="1G">參加者 1G</option>
            <option value="2G">參加者 2G</option>
            <option value="3G">參加者 3G</option>
            <option value="4G">參加者 4G</option>
            <option value="5G">參加者 5G</option>
            <option value="6G">參加者 6G</option>

            <option value="1H">參加者 1H</option>
            <option value="2H">參加者 2H</option>
            <option value="3H">參加者 3H</option>
            <option value="4H">參加者 4H</option>
            <option value="5H">參加者 5H</option>
            <option value="6H">參加者 6H</option>
          </select>
        </div>

        <div class="form-group">
          <label for="login-phone">電話號碼 (驗證用)：</label>
          <input type="tel" id="login-phone" placeholder="請輸入電話號碼" required />
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary">
          <span class="btn-text">登入系統</span>
          <div id="login-btn-progress" class="spinner-wrapper hidden">
            <span class="spinner"></span>
            <span class="spinner-text">0%</span>
          </div>
        </button>
      </form>
    </div>
  </div>

  <!-- ==========================================================================
       DASHBOARD SCREEN (MAIN INTERFACE)
       ========================================================================== -->
  <div id="dashboard-screen" class="container hidden">
    <!-- Header Area -->
    <header class="header">
      <div class="user-info">
        <span id="user-display-id" class="badge-id">ID: --</span>
      </div>
      <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm">退出登入</button>
    </header>

    <!-- Navigation Tabs -->
    <nav class="nav-tabs">
      <button id="tab-btn-send" class="tab-btn active" onclick="switchTab('send')">
        ✏️ 發送留言
      </button>
      <button id="tab-btn-inbox" class="tab-btn" onclick="switchTab('inbox')">
        📥 收件箱 <span id="inbox-count-badge" class="count-badge hidden">0</span>
      </button>
      <button id="tab-btn-sent" class="tab-btn" onclick="switchTab('sent')">
        📤 送出的留言 <span id="sent-count-badge" class="count-badge hidden">0</span>
      </button>
    </nav>

    <!-- TAB 1: SEND MESSAGE -->
    <section id="tab-send" class="tab-content active">
      <div class="card">
        <h2>撰寫留言</h2>
        <form id="send-msg-form" onsubmit="handleSendMessage(event)">
          <div class="form-group">
            <label for="target-participant-id">對象：</label>
            <select id="target-participant-id" required>
              <option value="" disabled selected>選擇對象 (1A - 6H)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="msg-content">留言內容：</label>
            <textarea 
              id="msg-content" 
              rows="4" 
              placeholder="請輸入想對對方說的話..." 
              maxlength="300"
              oninput="updateCharCount()" 
              required
            ></textarea>
            <div class="char-counter"><span id="char-num">0</span> / 300 字</div>
          </div>

          <button type="submit" id="send-btn" class="btn btn-primary">
            <span class="btn-text">發送留言</span>
            <div id="send-btn-progress" class="spinner-wrapper hidden">
              <span class="spinner"></span>
              <span class="spinner-text">0%</span>
            </div>
          </button>
        </form>
      </div>
    </section>

    <!-- TAB 2: INBOX -->
    <section id="tab-inbox" class="tab-content">
      <div class="card">
        <div class="section-header">
          <h2>收件箱</h2>
          <button onclick="fetchInboxMessages(true)" class="btn btn-sm btn-secondary">🔄 重整</button>
        </div>

        <div id="inbox-loading" class="loading-wrapper hidden">
          <span class="spinner"></span>
          <span>載入中... <span id="inbox-progress-text">0%</span></span>
        </div>

        <div id="inbox-empty" class="empty-state hidden">
          <p>目前沒有收到任何留言 📭</p>
        </div>

        <div id="inbox-feed" class="message-feed"></div>
      </div>
    </section>

    <!-- TAB 3: SENT MESSAGES -->
    <section id="tab-sent" class="tab-content">
      <div class="card">
        <div class="section-header">
          <h2>送出的留言</h2>
          <button onclick="fetchSentMessagesFromAPI(true)" class="btn btn-sm btn-secondary">🔄 重整</button>
        </div>

        <div id="sent-empty" class="empty-state hidden">
          <p>你尚未發送過任何留言 📤</p>
        </div>

        <div id="sent-feed" class="message-feed"></div>
      </div>
    </section>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast" class="toast hidden"></div>

  <!-- JavaScript Resource -->
  <script src="app.js"></script>
</body>
</html>
